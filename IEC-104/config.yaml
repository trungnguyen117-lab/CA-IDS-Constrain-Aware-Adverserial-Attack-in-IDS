# IEC-104 Project Configuration
# All paths are relative to IEC-104/ root directory
#
# Version system (--version / -V flag):
#   v1 (default) = current paths (adv_samples/adv_eval, defense/models)
#   v2+          = versioned (adv_samples/v2/adv_eval, defense/models_v2)
#   AT configs:  config/adv_training_{version}/ (stronger params per version)
#   Eval configs: config/attacks/ (constant across versions for fair comparison)

paths:
  # Datasets
  train: datasets/train_shap_66.csv
  test: datasets/test_shap_66.csv
  train_tvae: datasets/augment/train_tvae_9600.csv

  # Model directories
  models: training/models
  models_at: defense/models

  # Adversarial samples
  adv_eval: adv_samples/adv_eval
  adv_training: adv_samples/adv_training

  # Config
  attack_config: config/attacks
  training_config: config/training

  # Augmentation output
  augment_dir: datasets/augment

  # Versioned training datasets
  augment_train_v2: datasets/augment/train_tvae_12000.csv

  # Reports
  report: report

# Model file naming convention:
#   baseline:  framework_{model}_TVAE.{ext}
#   AT:        framework_{model}_TVAE_at.{ext}
#   ext: .pkl (tree), .pth (DL), .cbm (catboost)
models:
  tree: [xgb, cat, rf, et, lgbm]
  dl: [lstm, resdnn]

# Version-dataset mapping: --version flag maps to dataset key
# Add new versions here: v3: augment_train_v3, etc.
version_dataset:
  v1: train_tvae
  v2: augment_train_v2

# Feature set: 66 SHAP-selected features
n_features: 66
n_classes: 12
