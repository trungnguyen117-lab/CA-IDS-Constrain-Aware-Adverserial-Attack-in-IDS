# Randomized Smoothing hyperparameters for IEC-104
# Number of noisy samples per input for majority vote
n_samples: 30

# Relative noise scale: actual noise = sigma * feature_std[j]
# sigma=0.01 means 1% of each feature's standard deviation
sigma: 0.01

# Significance level for binomial test (lower = more abstention)
# Set to null to disable abstention (pure majority vote)
alpha: null

# Sweep sigma values for parameter tuning
sigma_sweep: [0.005, 0.01, 0.02, 0.05, 0.1]
