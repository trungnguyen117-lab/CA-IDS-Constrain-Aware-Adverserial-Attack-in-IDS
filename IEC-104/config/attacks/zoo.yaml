# ZooAttack (Zeroth-Order Optimization) parameters
# Black-box attack — compatible with all targets (xgb, cat, rf, et, lgbm, lstm, resdnn)

confidence: 0.0
targeted: false
learning_rate: 0.1
max_iter: 30
binary_search_steps: 3
initial_const: 0.001
abort_early: true
use_resize: false
use_importance: false
nb_parallel: 10
batch_size: 1
variable_h: 0.02
verbose: true
