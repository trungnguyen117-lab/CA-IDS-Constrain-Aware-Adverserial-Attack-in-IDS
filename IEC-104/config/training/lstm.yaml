# LSTM training hyperparameters (IEC-104)
# Source: IEC-104/training/8_multi_method.ipynb
# Architecture: BiLSTM + Attention pooling for tabular data
# Note: `input_dim`, `num_class`, and `device` are set at runtime

# ── Architecture ──
step_dim: 16
hidden: 256
layers: 2
dropout: 0.15
bidir: true

# ── Optimiser ──
lr: 0.001
weight_decay: 0.0002

# ── Training schedule ──
batch_size: 2048
max_epochs: 200
patience: 30
