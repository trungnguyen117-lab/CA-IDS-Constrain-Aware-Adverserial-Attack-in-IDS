# RF quick variant — cho gen BB attack (HSJA/ZOO) nhanh.
# 200 trees + max_depth=15 → predict ~6× nhanh hơn canonical 850 trees.
# F1 thường giảm <1%. Train: --config-variant quick.
n_estimators: 200

max_leaf_nodes: 2000
criterion: entropy
class_weight: balanced
bootstrap: true
random_state: 0
n_jobs: 1
