# Autoencoder-based DSE for adversarial sample detection

# Architecture
bottleneck_dim: 8
hidden_dims: [128, 64, 32]

# Training
lr: 0.001
weight_decay: 0.0001
batch_size: 256
max_epochs: 100
patience: 20

# Detection threshold
# Calibrated from HSJA adv samples: tau=0.10 -> det=91.5%, fpr=1.1%
threshold_percentile: 99.0  # fallback: tau = p99 of clean recon errors
threshold_fixed: 0.10       # override: use fixed tau from calibration
