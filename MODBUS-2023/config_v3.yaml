# MODBUS-2023 dataset config — variant v3.
# Deep TVAE config (512x512, epochs 800, batch 250, l2 1e-5, cuda) — thử lại.
# Chỉ khác v2 ở output dirs (`*_v3/`) để chạy ablation song song.
# Tất cả paths tương đối tới MODBUS-2023/ root.

name: MODBUS-2023-v3
label_col: Label
n_classes: 9
label_names:
  - BENIGN
  - BASELINE_REPLAY
  - BRUTE_FORCE
  - DELAY_RESPONSE
  - FRAME_STACKING
  - LENGTH_MANIPULATION
  - PAYLOAD_INJECTION
  - QUERY_FLOODING
  - RECON

paths:
  # ── Inputs read-only (chia sẻ với v2 — CSFS không phụ thuộc TVAE) ──
  raw: /Users/trungnguye2n.dev/Downloads/Labeled_CICMODBUS2023.csv
  train_for_shap: datasets/train_70_balanced_600.csv # canonical
  test_for_shap: datasets/test_30_600.csv # canonical
  # Stage `topup` v3 đọc 2 file này từ output v2 (KHÔNG ghi):
  train_shap_real: datasets/train_shap_58_600_repro.csv # share v2 (input topup)
  test_shap_real: datasets/test_shap_58_600_repro.csv # share v2 (input topup)

  # ── v3 pipeline outputs (suffix _v3 — KHÔNG đè v2 `_repro`) ──
  # Stage `clean/split/balance` chỉ kích hoạt nếu user chạy `--from clean|split|balance`.
  # Mặc định v3 chạy `--from topup --until topup` → 4 file này KHÔNG bị tạo.
  cleaned_repro: datasets/Labeled_CICMODBUS2023_cleaned_v3.csv
  train_split_repro: datasets/train_70_600_v3.csv
  train_for_shap_repro: datasets/train_70_balanced_600_v3.csv
  test_for_shap_repro: datasets/test_30_600_v3.csv

  # ── Topup output v3 (filename auto theo --epochs 800) ──
  topup_dir: datasets # → datasets/modbus_train_merged_t1400_e800_repro.csv

  # ── Inputs cho CLI eval (train/test cuối v3) ──
  train: datasets/modbus_train_merged_t1400_e800_repro.csv # TVAE v3 topup output
  test: datasets/test_shap_58_600_repro.csv # share v2 test (100% real)

  # ── Outputs models/adv/report (TÁCH RIÊNG so với v2) ──
  models: baseline_v3/models
  models_at: defense_v3/at
  models_pgd_at: defense_v3/pgd_at
  models_distill: defense_v3/distill
  magnet: defense_v3/magnet
  adv_eval: adv_samples_v3/adv_eval
  adv_training: adv_samples_v3/adv_training
  report: report_v3

models:
  tree_targets: [xgb, cat, rf, et, lgbm]
  dl_targets: [dnn]
  surrogate_targets: [surrogate_resdnn]
  ext:
    {
      xgb: .pkl,
      cat: .pkl,
      rf: .pkl,
      et: .pkl,
      lgbm: .pkl,
      dnn: .pth,
      surrogate_resdnn: .pth,
    }
  dl_factory:
    dnn: model_local.DNNModel
    surrogate_resdnn: model_local.SurrogateResDNN

attacks:
  wb: [fgsm, pgd, deepfool, cw, jsma]
  bb: [zoo, hsja]
  compat:
    xgb: [zoo, hsja]
    cat: [zoo, hsja]
    rf: [zoo, hsja]
    et: [zoo, hsja]
    lgbm: [zoo, hsja]
    dnn: [fgsm, pgd, deepfool, cw, jsma, zoo, hsja]
    surrogate_resdnn: [fgsm, pgd, deepfool, cw, jsma, zoo, hsja]
  transfer_sources:
    xgb: [dnn]
    cat: [dnn]
    rf: [dnn]
    et: [dnn]
    lgbm: [dnn]

at_clean_ratio:
  dnn: 0.5
  xgb: 0.1
  cat: 0.1
  rf: 0.1
  et: 0.1
  lgbm: 0.1

split:
  random_state: 42

augment:
  mode: balance_to
  train_target: 1400
  modbus:
    drop_manual: [Src_Port, Dst_Port]
    abundant_labels: [0, 2]
    test_n_per_abundant: 600
    balance_n_per_abundant: 1400
    rare_test_ratio: 0.3
  tvae:
    epochs: 800
    batch_size: 250
    embedding_dim: 128
    compress_dims: [512, 512]
    decompress_dims: [512, 512]
    l2scale: 1.0e-5
    loss_factor: 2.0
    cuda: false
  random_state: 42

covas:
  pair: [BRUTE_FORCE, RECON]
  bins: 100
  robust: true
  thresholds:
    overlap: 0.90
    ks: 0.05
    dist: 0.01

shap:
  top_k: 50
  val_size: 0.1
  random_state: 42
  drop_covas_dead: true
  rf_cfg:
    n_estimators: 100
    max_leaf_nodes: 15000
    criterion: entropy
    class_weight: balanced
    bootstrap: true
    n_jobs: -1
    random_state: 0
  xgb_cfg:
    max_depth: 8
    n_estimators: 3000
    learning_rate: 0.1
    objective: "multi:softprob"
    eval_metric: mlogloss
    booster: gbtree
    tree_method: hist
    n_jobs: -1
    random_state: 42
    early_stopping_rounds: 50
