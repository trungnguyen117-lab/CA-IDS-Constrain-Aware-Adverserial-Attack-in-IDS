# MODBUS-2023 dataset config — variant v2.
# Inherits the schema of config.yaml; only artifact paths differ
# (suffix _v2) so runs do not overwrite the canonical artifacts.
# All paths relative to MODBUS-2023/ root directory.

name: MODBUS-2023-v2
label_col: Label
n_classes: 9
label_names:
  - BENIGN
  - BASELINE_REPLAY
  - BRUTE_FORCE
  - DELAY_RESPONSE
  - FRAME_STACKING
  - LENGTH_MANIPULATION
  - PAYLOAD_INJECTION
  - QUERY_FLOODING
  - RECON

paths:
  # ── Inputs (shared with config.yaml — đổi nếu muốn dataset khác) ──
  train: datasets/modbus_train_merged_t1400_e200_repro.csv
  test: datasets/test_shap_58_600_repro.csv
  raw: /Users/trungnguye2n.dev/Downloads/Labeled_CICMODBUS2023.csv

  cleaned_repro: datasets/Labeled_CICMODBUS2023_cleaned_repro.csv
  train_split_repro: datasets/train_70_600_repro.csv

  train_for_shap: datasets/train_70_balanced_600.csv
  test_for_shap: datasets/test_30_600.csv
  train_for_shap_repro: datasets/train_70_balanced_600_repro.csv
  test_for_shap_repro: datasets/test_30_600_repro.csv

  train_shap_real: datasets/train_shap_58_600_repro.csv
  test_shap_real: datasets/test_shap_58_600_repro.csv
  topup_dir: datasets

  # ── Outputs (TÁCH RIÊNG so với config.yaml) ──
  models: baseline_v2/models
  models_at: defense_v2/at
  models_pgd_at: defense_v2/pgd_at
  models_distill: defense_v2/distill
  magnet: defense_v2/magnet
  adv_eval: adv_samples_v2/adv_eval
  adv_training: adv_samples_v2/adv_training
  report: report_v2

models:
  tree_targets: [xgb, cat, rf, et, lgbm]
  dl_targets: [dnn]
  surrogate_targets: [surrogate_resdnn]
  ext:
    {
      xgb: .pkl,
      cat: .pkl,
      rf: .pkl,
      et: .pkl,
      lgbm: .pkl,
      dnn: .pth,
      surrogate_resdnn: .pth,
    }
  dl_factory:
    dnn: model_local.DNNModel
    surrogate_resdnn: model_local.SurrogateResDNN

attacks:
  wb: [fgsm, pgd, deepfool, cw, jsma]
  bb: [zoo, hsja]
  compat:
    xgb: [zoo, hsja]
    cat: [zoo, hsja]
    rf: [zoo, hsja]
    et: [zoo, hsja]
    lgbm: [zoo, hsja]
    dnn: [fgsm, pgd, deepfool, cw, jsma, zoo, hsja]
    surrogate_resdnn: [fgsm, pgd, deepfool, cw, jsma, zoo, hsja]
  transfer_sources:
    xgb: [dnn]
    cat: [dnn]
    rf: [dnn]
    et: [dnn]
    lgbm: [dnn]

at_clean_ratio:
  dnn: 0.5
  xgb: 0.1
  cat: 0.1
  rf: 0.1
  et: 0.1
  lgbm: 0.1

split:
  random_state: 42

augment:
  mode: balance_to
  train_target: 1400
  modbus:
    drop_manual: [Src_Port, Dst_Port]
    abundant_labels: [0, 2]
    test_n_per_abundant: 600
    balance_n_per_abundant: 1400
    rare_test_ratio: 0.3
  tvae:
    epochs: 200
    batch_size: 512
    embedding_dim: 64
    compress_dims: [128, 64]
    decompress_dims: [64, 128]
    l2scale: 1.0e-4
    loss_factor: 2.0
    cuda: false
  random_state: 42

covas:
  pair: [BRUTE_FORCE, RECON]
  bins: 100
  robust: true
  thresholds:
    overlap: 0.90
    ks: 0.05
    dist: 0.01

shap:
  top_k: 50
  val_size: 0.1
  random_state: 42
  drop_covas_dead: true
  rf_cfg:
    n_estimators: 100
    max_leaf_nodes: 15000
    criterion: entropy
    class_weight: balanced
    bootstrap: true
    n_jobs: -1
    random_state: 0
  xgb_cfg:
    max_depth: 8
    n_estimators: 3000
    learning_rate: 0.1
    objective: "multi:softprob"
    eval_metric: mlogloss
    booster: gbtree
    tree_method: hist
    n_jobs: -1
    random_state: 42
    early_stopping_rounds: 50
