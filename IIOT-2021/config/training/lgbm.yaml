# LightGBM training params — mirror LightGBMModel.DEFAULT_PARAMS.
boosting_type: gbdt
objective: multiclass
learning_rate: 0.15
max_depth: 5
n_estimators: 10
class_weight: balanced
metric: multi_logloss
n_jobs: 1 # macOS arm64 libomp conflict; -1 segfaults
random_state: 42
verbose: -1
early_stopping_rounds: 50
