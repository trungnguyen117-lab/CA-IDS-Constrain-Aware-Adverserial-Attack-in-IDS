# PGD (Projected Gradient Descent) parameters
# White-box iterative attack — requires differentiable model (lstm, resdnn only)
# Reference: https://adversarial-robustness-toolbox.readthedocs.io/en/latest/modules/attacks/evasion.html#projected-gradient-descent

eps: 0.2               # Maximum L-inf perturbation budget (total allowed distortion)
eps_step: 0.01         # Step size per iteration (smaller = finer search, slower)
max_iter: 200          # Maximum number of PGD iterations
batch_size: 64         # Number of samples processed per batch
targeted: false        # true = force a specific target class; false = untargeted
verbose: true          # Print progress during generation
