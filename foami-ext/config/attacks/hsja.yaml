# HopSkipJump Attack (HSJA) parameters # Black-box decision-boundary attack — compatible with all targets
# Reference: https://adversarial-robustness-toolbox.readthedocs.io/en/latest/modules/attacks/evasion.html#hopskipjump-attack

batch_size: 8    # Nhỏ để tránh OOM và chậm; HSJA tốn ~init_eval + max_iter*max_eval queries/sample
targeted: false  # true = nhắm class cụ thể; false = thoát khỏi true class
norm: 2          # L2 norm
max_iter: 3      # Số vòng lặp outer (tăng = mạnh hơn nhưng chậm hơn)
max_eval: 50     # Số model queries/iter để ước gradient → tổng ~10 + 3*50 = 160 queries/sample
init_eval: 10    # Số queries khởi tạo gradient
init_size: 10    # Số lần thử tìm adversarial khởi đầu
verbose: true
